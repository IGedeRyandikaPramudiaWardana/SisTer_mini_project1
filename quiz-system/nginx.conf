events {}

http {
    # Mendefinisikan grup server API kita (Load Balancing)
    upstream quiz_api {
        server api1:5000;
        server api2:5000;
    }

    server {
        listen 80;

        location / {
            # Meneruskan request dari frontend (Next.js) ke grup API
            proxy_pass http://quiz_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            proxy_connect_timeout 300;
            proxy_send_timeout 300;
            proxy_read_timeout 300;
        }
    }
}