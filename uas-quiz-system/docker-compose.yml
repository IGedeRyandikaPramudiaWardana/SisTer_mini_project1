version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: quiz_user
      POSTGRES_PASSWORD: quiz_password
      POSTGRES_DB: quiz_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api1:
    build: .
    command: python api_gateway.py
    environment:
      - DATABASE_URL=postgresql://quiz_user:quiz_password@db:5432/quiz_db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
      - db

  api2:
    build: .
    command: python api_gateway.py
    environment:
      - DATABASE_URL=postgresql://quiz_user:quiz_password@db:5432/quiz_db
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - rabbitmq
      - db

  worker-1:
    build: .
    command: python worker.py
    environment:
      NODE_NAME: "worker-1"
      NODE_ID: "1"
      ALL_NODES: "worker-1:1,worker-2:2,worker-3:3"
      DATABASE_URL: postgresql://quiz_user:quiz_password@db:5432/quiz_db
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq
      - db

  worker-2:
    build: .
    command: python worker.py
    environment:
      NODE_NAME: "worker-2"
      NODE_ID: "2"
      ALL_NODES: "worker-1:1,worker-2:2,worker-3:3"
      DATABASE_URL: postgresql://quiz_user:quiz_password@db:5432/quiz_db
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq
      - db

  worker-3:
    build: .
    command: python worker.py
    environment:
      NODE_NAME: "worker-3"
      NODE_ID: "3"
      ALL_NODES: "worker-1:1,worker-2:2,worker-3:3"
      DATABASE_URL: postgresql://quiz_user:quiz_password@db:5432/quiz_db
      RABBITMQ_HOST: rabbitmq
    depends_on:
      - rabbitmq
      - db

  nginx_lb:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "8080:80"
    depends_on:
      - api1
      - api2

volumes:
  pgdata: